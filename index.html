<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Document</title>
  </head>
  <body>
    <div class="header">
      <h1 class="title">Rock Paper Scissors</h1>
      <p>First to 5 wins!</p>
    </div>
    <div class="play unselectable pointer">
      <p>Play Game!</p>
    </div>
    <div class="options unselectable">
      <div class="rock pointer hide">
        <p id="rock">Rock</p>
      </div>
      <div class="paper pointer hide">
        <p id="paper">Paper</p>
      </div>
      <div class="scissors pointer hide">
        <p id="scissors">Scissors</p>
      </div>
    </div>

    <div class="score">
      <div class="moves">
        <p class="hide human"></p>
        <p class="hide computer"></p>
        <p class="hide outcome"></p>
      </div>
      <div class="currentScore hide">
        <p>Current Score: </p>
      </div>
      <div class="finalScore hide">
        <p>Final Score: </p>
      </div>
    </div>

    <div class="reload hide pointer">
      <p class="unselectable">Play Again!</p>
    </div>
    <script src="script.js">
    </script>
  </body>
</html>
